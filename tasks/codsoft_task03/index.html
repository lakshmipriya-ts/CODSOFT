<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Level 1 - Task 3 Calculator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="calculator">
    <div class="display" id="display">0</div>

    <div class="buttons">
      <button class="btn function" data-action="clear">C</button>
      <button class="btn function" data-action="delete">DEL</button>
      <button class="btn operator" data-action="operator">÷</button>
      <button class="btn operator" data-action="operator">×</button>

      <button class="btn number">7</button>
      <button class="btn number">8</button>
      <button class="btn number">9</button>
      <button class="btn operator" data-action="operator">-</button>

      <button class="btn number">4</button>
      <button class="btn number">5</button>
      <button class="btn number">6</button>
      <button class="btn operator" data-action="operator">+</button>

      <button class="btn number">1</button>
      <button class="btn number">2</button>
      <button class="btn number">3</button>
      <button class="btn equals" data-action="equals">=</button>

      <button class="btn number zero">0</button>
      <button class="btn number">.</button>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
